<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Egyptian vs Hindu Tic-Tac-Toe</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- decorative corners -->
<div class="corner tl">𓂀</div>
<div class="corner tr">ॐ</div>
<div class="corner bl">☥</div>
<div class="corner br">🪷</div>

<div class="page">

  <!-- header -->
  <header>
    <div class="title-line1">Egyptian &amp; Hindu<br>Tic-Tac-Toe</div>
    <div class="title-line2">Battle of the Ancient Realms</div>
    <div class="divider"></div>
  </header>

  <!-- player cards -->
  <div class="players">
    <div class="player-card egypt active-turn" id="card-egypt">
      <div class="turn-crown">👑</div>
      <div class="player-symbol">☥</div>
      <div class="player-name">Egypt</div>
      <div class="player-title">Pharaoh's Ankh</div>
      <div class="player-score" id="score-egypt">0</div>
      <div class="score-label">VICTORIES</div>
    </div>

    <div class="vs-badge">VS</div>

    <div class="player-card hindu" id="card-hindu">
      <div class="turn-crown">👑</div>
      <div class="player-symbol">ॐ</div>
      <div class="player-name">India</div>
      <div class="player-title">Divine Om</div>
      <div class="player-score" id="score-hindu">0</div>
      <div class="score-label">VICTORIES</div>
    </div>
  </div>

  <!-- mode selector -->
  <div class="mode-row">
    <button class="mode-btn active" id="mode-2p">2 Players</button>
    <button class="mode-btn" id="mode-easy">vs AI — Easy</button>
    <button class="mode-btn" id="mode-hard">vs AI — Hard</button>
  </div>

  <!-- status -->
  <div class="status">
    <div class="status-text egypt-msg" id="status">Egypt's turn — Place the Ankh ☥</div>
  </div>

  <!-- board -->
  <div class="board-wrapper">
    <div class="board-aura" id="board-aura"></div>
    <div class="board" id="board">
      <!-- 9 cells rendered by JS -->
    </div>
  </div>

  <!-- controls -->
  <div class="controls">
    <button class="btn btn-restart" id="btn-restart">New Round</button>
    <button class="btn btn-music" id="btn-music">🎵 Music</button>
    <button class="btn btn-reset-score" id="btn-reset">Reset Scores</button>
  </div>

  <!-- draws -->
  <div class="draws-row">Draws: <span id="draws">0</span></div>

  <!-- footer decoration -->
  <div class="footer-symbols">
    <span>𓂀</span><span>☥</span><span>𓆙</span><span>ॐ</span><span>🪷</span><span>🔱</span>
  </div>

</div>

<script src="gameLogic.js"></script>
<script src="script.js"></script>
</body>
</html>
